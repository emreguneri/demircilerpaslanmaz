<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 56 56" role="img" aria-label="Demirciler Paslanmaz logo">
  <!-- Designed for dark background (provided by CSS on .mark). -->
  <defs>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb067"/>
      <stop offset="1" stop-color="#ff6a1a"/>
    </linearGradient>
  </defs>

  <!-- Welder silhouette (minimal, original) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Helmet / head -->
    <path d="M22 18c0-5 4-9 9-9 4 0 7 2 9 5" stroke="#f3f6ff" stroke-width="2.6"/>
    <path d="M23 22c2-2 5-3 8-3 6 0 11 4 12 10" stroke="#cfd8ea" stroke-width="2.6"/>
    <!-- Visor -->
    <path d="M27 20h8" stroke="#f3f6ff" stroke-width="2.6"/>
    <path d="M26 23h10" stroke="#cfd8ea" stroke-width="2.6"/>

    <!-- Shoulder / body -->
    <path d="M16 42c2-9 9-15 18-15 8 0 14 4 16 10" stroke="#cfd8ea" stroke-width="2.6"/>
    <path d="M18 42h24" stroke="#f3f6ff" stroke-width="2.6"/>

    <!-- Torch / hand -->
    <path d="M36 30l6 2" stroke="#f3f6ff" stroke-width="2.6"/>
    <path d="M41 32l2 4" stroke="#cfd8ea" stroke-width="2.6"/>

    <!-- Sparks -->
    <path d="M45 29l5-3" stroke="url(#spark)" stroke-width="2.2"/>
    <path d="M45 33l6 1" stroke="url(#spark)" stroke-width="2.2"/>
    <path d="M43 27l3-6" stroke="url(#spark)" stroke-width="2.2"/>
    <path d="M48 36l3 4" stroke="url(#spark)" stroke-width="2.2"/>
    <circle cx="49.2" cy="31.1" r="1.4" fill="#ff6a1a" stroke="none"/>
    <circle cx="46.7" cy="25.6" r="1.1" fill="#ffb067" stroke="none"/>
  </g>
</svg>

